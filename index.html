<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>최재우 ♥ 이주연 결혼합니다</title>
  <meta name="description" content="2026년 6월 6일 토요일 오후 6시 30분, 역삼 아모리스에서 결혼합니다." />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="최재우 ♥ 이주연 결혼합니다" />
  <meta property="og:description" content="2026년 6월 6일 토요일 오후 6시 30분 · 역삼 아모리스" />
  <meta property="og:image" content="https://wooju-wedding.com/images/og-image.jpg" />
  <meta property="og:url" content="https://wooju-wedding.com/" />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💍</text></svg>" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="page-wrapper">

  <!-- ─── 1. 커버 ─── -->
  <section id="section-cover" aria-label="커버">
    <div class="cover-bg" role="img" aria-label="웨딩 커버 사진"></div>
    <div class="cover-overlay" aria-hidden="true"></div>

    <div class="cover-content" id="cover-content">
      <div class="cover-names">
        <span id="cover-groom-name"></span>
        <span class="separator">♥</span>
        <span id="cover-bride-name"></span>
      </div>
      <p class="cover-date" id="cover-date"></p>
      <p class="cover-location-text" id="cover-location"></p>
      <p class="cover-countdown" id="countdown" aria-label="결혼식까지 남은 날"></p>
    </div>

    <div class="scroll-arrow" aria-hidden="true">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
    </div>
  </section>

  <!-- ─── 2. 초대 문구 ─── -->
  <section id="section-greeting" aria-label="초대 문구">
    <p class="section-title fade-in">Invitation</p>

    <h2 class="greeting-title fade-up" id="greeting-title"></h2>
    <div class="divider" aria-hidden="true"></div>

    <div id="greeting-text" class="fade-up" style="--delay:0.1s"></div>

    <div class="greeting-gif fade-up" style="--delay:0.15s" aria-hidden="true">
      <img src="images/cover/bridge.gif" alt="" />
    </div>

    <div id="parents-info" class="parents-info fade-up" style="--delay:0.2s" aria-label="양가 부모님"></div>

    <div class="greeting-event-info fade-up" style="--delay:0.3s" aria-label="예식 정보">
      <strong id="greeting-date"></strong><br>
      <span id="greeting-location"></span>
    </div>

    <div class="greeting-contact fade-up" style="--delay:0.4s">
      <button class="btn-contact-open" id="btn-contact-open" aria-label="연락하기">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 10a19.79 19.79 0 01-3.07-8.67A2 2 0 012 .18h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.91A16 16 0 0016.09 17.09l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7a2 2 0 011.72 2.02z"></path>
        </svg>
        연락하기
      </button>
    </div>
  </section>

  <!-- ─── 3. 갤러리 ─── -->
  <section id="section-gallery" aria-label="사진 갤러리">
    <p class="section-title fade-in">Gallery</p>

    <!-- 캐러셀 -->
    <div class="carousel-wrapper" aria-label="웨딩 사진 캐러셀">
      <div class="carousel-slide-area">
        <div class="carousel-track-container">
          <div class="carousel-track" id="carousel-track" role="list"></div>
        </div>
        <button class="carousel-btn carousel-prev" id="carousel-prev" aria-label="이전 사진" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
        <button class="carousel-btn carousel-next" id="carousel-next" aria-label="다음 사진">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 6 15 12 9 18"></polyline>
          </svg>
        </button>
      </div>
      <div class="carousel-dots" id="carousel-dots" role="tablist" aria-label="슬라이드 선택"></div>
    </div>

    <!-- 썸네일 액자 그리드 -->
    <div class="gallery-thumbs" id="gallery-thumbs" role="list" aria-label="웨딩 사진 목록"></div>
  </section>

  <!-- ─── 4. 장소 ─── -->
  <section id="section-location" aria-label="예식 장소">
    <p class="section-title fade-in">Location</p>

    <h2 class="location-name fade-up" id="location-name"></h2>
    <p class="location-hall fade-up" style="--delay:0.05s" id="location-hall"></p>
    <p class="location-address fade-up" style="--delay:0.1s" id="location-address"></p>

    <div class="map-container fade-up" style="--delay:0.15s">
      <div id="google-map-container" style="width:100%;height:100%;" aria-label="예식장 지도"></div>
    </div>

    <div class="map-buttons fade-up" style="--delay:0.2s">
      <!-- 카카오내비 -->
      <a id="btn-kakaomap" href="#" target="_blank" rel="noopener" class="btn-map btn-map-kakao" aria-label="카카오내비로 보기">
        <img class="map-brand-icon" src="images/maps/kakaomap.png" alt="" aria-hidden="true" />
        카카오내비
      </a>

      <!-- 네이버지도 -->
      <a id="btn-navermap" href="#" target="_blank" rel="noopener" class="btn-map btn-map-naver" aria-label="네이버지도로 보기">
        <img class="map-brand-icon" src="images/maps/navermap.webp" alt="" aria-hidden="true" />
        네이버지도
      </a>

      <!-- 티맵 -->
      <a id="btn-tmap" href="#" target="_blank" rel="noopener" class="btn-map btn-map-tmap" aria-label="티맵으로 보기">
        <img class="map-brand-icon" src="images/maps/tmap.jpeg" alt="" aria-hidden="true" />
        티맵
      </a>
    </div>

    <div class="transport-info fade-up" style="--delay:0.25s" aria-label="교통 안내">
      <h4>교통 안내</h4>
      <ul id="location-transport"></ul>
      <p class="parking-info">🅿 <span id="location-parking"></span></p>
    </div>
  </section>

  <!-- ─── 5. 계좌 ─── -->
  <section id="section-account" aria-label="마음 전하실 곳">
    <p class="section-title fade-in">Account</p>
    <h2 class="section-subtitle fade-up">마음 전하실 곳</h2>

    <div class="account-tabs" role="tablist" aria-label="신랑/신부 계좌">
      <button class="account-tab active" role="tab" aria-selected="true"
              aria-controls="account-groom" data-target="account-groom">
        신랑측
      </button>
      <button class="account-tab" role="tab" aria-selected="false"
              aria-controls="account-bride" data-target="account-bride">
        신부측
      </button>
    </div>

    <div id="account-groom" class="account-panel active" role="tabpanel"></div>
    <div id="account-bride" class="account-panel" role="tabpanel"></div>
  </section>

  <!-- ─── 6. 푸터 ─── -->
  <footer aria-label="공유">
    <div class="footer-photo">
      <img src="images/cover/last_cover.jpeg" alt="최재우 이주연" />
    </div>

    <p class="footer-names" id="footer-names"></p>

    <div class="share-buttons">
      <button id="btn-kakao-share" class="btn-share btn-share-kakao" aria-label="카카오톡으로 공유">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor" aria-hidden="true">
          <path d="M9 1.5C4.86 1.5 1.5 4.14 1.5 7.38c0 2.1 1.38 3.93 3.45 4.98L4.2 15l3.33-2.22c.48.06.96.09 1.47.09 4.14 0 7.5-2.64 7.5-5.88S13.14 1.5 9 1.5z"/>
        </svg>
        카카오톡 공유
      </button>

      <button id="btn-copy-link" class="btn-share btn-share-link" aria-label="링크 복사">
        🔗 링크 복사
      </button>
    </div>

    <p class="footer-copy">© 2026 최재우 · 이주연</p>
  </footer>

</div><!-- /.page-wrapper -->

<!-- ─── BGM 토글 ─── -->
<button id="bgm-toggle" class="bgm-toggle" aria-label="배경음악 재생">
  <svg class="bgm-icon-play" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
    <line x1="23" y1="9" x2="17" y2="15"></line>
    <line x1="17" y1="9" x2="23" y2="15"></line>
  </svg>
  <svg class="bgm-icon-pause" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
    <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
    <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
  </svg>
</button>
<audio id="bgm-audio" src="bgm/wedding.mp3" loop preload="auto"></audio>

<!-- ─── 연락하기 전체화면 ─── -->
<div id="modal-contact" class="modal-contact" role="dialog" aria-modal="true" aria-label="연락하기">
  <div class="modal-header">
    <button class="modal-back" id="modal-close" aria-label="뒤로가기">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    </button>
    <h3 class="modal-title">연락하기</h3>
    <div class="modal-header-spacer" aria-hidden="true"></div>
  </div>
  <div class="modal-body">
    <div class="contact-list" id="contact-list"></div>
  </div>
</div>

<!-- 스크립트 -->
<script src="js/data.js"></script>
<script src="js/animations.js"></script>
<script src="js/main.js"></script>

<!-- 카카오 SDK -->
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"
        integrity="sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4"
        crossorigin="anonymous"></script>
<script>Kakao.init('73535e288dd4f87655f8b52f5670810c');</script>

</body>
</html>
